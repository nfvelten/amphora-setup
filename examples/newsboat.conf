# newsboat configuration — amphora integration
# Add these lines to ~/.newsboat/config

# Save article with claude summary (background, non-blocking)
macro s set browser "newsboat-save-bg %u"; open-in-browser ; set browser "xdg-open %u"

# Alternatively, bind to a key directly:
# bind-key S open-in-browser-and-mark-read

# Full example config with common settings:
#
# urls-file ~/.newsboat/urls
# cache-file ~/.newsboat/cache.db
# auto-reload yes
# reload-time 30
# max-items 100
#
# browser xdg-open %u
#
# # Save article to vault (Super+S while on an article)
# macro s set browser "newsboat-save-bg %u"; open-in-browser ; set browser "xdg-open %u"
